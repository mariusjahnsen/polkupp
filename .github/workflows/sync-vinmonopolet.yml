name: Daglig Vinmonopolet-sync

on:
  schedule:
    # 05:13 UTC = 07:13 norsk sommertid, 06:13 vintertid.
    # Off-peak-minutt unngår GH Actions schedule-forsinkelse på topp-av-time
    # (verifisert: "0 6" ble forsinket 4-6 timer hver dag i mai 2026).
    # Vinmonopolets master-data oppdateres ~05:45 CET, så data er moden
    # lenge før vi treffer.
    - cron: "13 5 * * *"
  workflow_dispatch: # tillater manuell kjøring fra Actions-fanen

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Installer dependencies
        run: npm ci

      - name: Inkrementell sync (changedSince + HTML-scrape per ID)
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VINMONOPOLET_API_KEY: ${{ secrets.VINMONOPOLET_API_KEY }}
          SITE_URL: https://polkupp.vercel.app
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: node scripts/sync-incremental.mjs
