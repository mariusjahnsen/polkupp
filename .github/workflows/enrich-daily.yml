name: Daglig enrichment

# Kjører 06:30 UTC = 30 min etter daglig sync. Da er ferske drops registrert
# i daily_drops, og enrich-skriptet plukker opp top-N etter pct_drop.
# Default 10 viner/dag = ~$3-6/mnd estimert. Justerbar via workflow_dispatch.

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Antall viner å berike (default 10)"
        required: false
        default: "10"

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Berik dagens drops
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/enrich-wines.mjs --limit=${{ github.event.inputs.limit || '10' }}
